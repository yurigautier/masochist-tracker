const API_BASE = 'https://api.typegg.io/v1';
let abortController = null;

const input = document.getElementById('username-input');
const btn = document.getElementById('fetch-btn');
const errorArea = document.getElementById('error-area');
const resultsArea = document.getElementById('results-area');

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) startFetch(); });

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchWithRetry(url, signal, retries = 3) {
  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      const resp = await fetch(url, { signal, headers: { 'Accept': 'application/json' } });
      if (resp.status === 429) {
        await sleep(Math.min(2000 * (attempt + 1), 6000));
        continue;
      }
      if (!resp.ok) return { ok: false, status: resp.status, data: null };
      const data = await resp.json();
      return { ok: true, status: resp.status, data };
    } catch (err) {
      if (err.name === 'AbortError') throw err;
      if (attempt === retries - 1) return { ok: false, status: 0, data: null, err: err.message };
      await sleep(1000 * (attempt + 1));
    }
  }
  return { ok: false, status: 0, data: null };
}

async function startFetch() {
  const username = input.value.trim();
  if (!username) return;

  if (abortController) abortController.abort();
  abortController = new AbortController();

  btn.disabled = true;
  btn.textContent = 'Scanning...';
  errorArea.innerHTML = '';
  resultsArea.innerHTML = '';
  showLoading(0, QUOTES.length, 0);

  const results = [];
  const BATCH = 4;
  let errorCount = 0;

  try {
    for (let i = 0; i < QUOTES.length; i += BATCH) {
      const batch = QUOTES.slice(i, i + BATCH);
      const batchResults = await Promise.all(
        batch.map(q => processQuote(q.slug, username, abortController.signal))
      );
      for (const r of batchResults) if (r.error) errorCount++;
      results.push(...batchResults);
      showLoading(results.length, QUOTES.length, errorCount);
      if (i + BATCH < QUOTES.length) await sleep(200);
    }
    renderResults(username, results, errorCount);
  } catch (err) {
    if (err.name !== 'AbortError') {
      errorArea.innerHTML = `<div class="error-msg">Something went wrong: ${err.message || 'Please try again.'}</div>`;
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Track';
  }
}

  const length = (typeof data.length === 'number') ? data.length : (data.text ? data.text.length : null);
  const lb = data.leaderboard || [];
  const userEntry = lb.find(e => e.username && e.username.toLowerCase() === username.toLowerCase());

  return {
    slug,
    completed: !!userEntry,
    length,
    wpm: userEntry ? userEntry.wpm : null,
    accuracy: userEntry ? userEntry.accuracy : null,
    error: false,
    lbSize: lb.length
  };
}

function showLoading(done, total, errors) {
  const pct = Math.round((done / total) * 100);
  resultsArea.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Scanning quote leaderboards...</p>
      <div class="progress-bar-bg" style="max-width:280px;margin:12px auto 8px">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <p class="progress-detail">${done} / ${total} checked${errors > 0 ? ` (${errors} failed)` : ''}</p>
    </div>`;
}

function renderResults(username, results, errorCount) {
  const merged = QUOTES.map((q, i) => ({ ...q, ...results[i] }));
  const completed = merged.filter(q => q.completed);
  const remaining = merged.filter(q => !q.completed && !q.error);
  const errored = merged.filter(q => q.error);

  const totalChars = merged.reduce((s, q) => s + (q.length || 0), 0);
  const typedChars = completed.reduce((s, q) => s + (q.length || 0), 0);
  const remainingChars = totalChars - typedChars;
  const pct = Math.round((completed.length / QUOTES.length) * 100);

  let warnHtml = '';
  if (errorCount > 0) {
    warnHtml = `<div class="warn-msg">${errorCount} quote${errorCount > 1 ? 's' : ''} failed to load (likely rate-limited by the API). These show with a dashed border and red dot. Try scanning again in a minute for full results.</div>`;
  }

  let html = warnHtml + `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value" style="color:var(--completed)">${completed.length}<span style="font-size:0.8rem;color:var(--text3);font-weight:400"> / 100</span></div>
        <div class="stat-sub">${pct}% done</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Remaining</div>
        <div class="stat-value" style="color:var(--remaining)">${remaining.length}${errored.length > 0 ? `<span style="font-size:0.8rem;color:var(--text3);font-weight:400"> +${errored.length}?</span>` : ''}</div>
        <div class="stat-sub">quotes left</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total chars</div>
        <div class="stat-value">${totalChars.toLocaleString()}</div>
        <div class="stat-sub">across all 100</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-labels"><span>${completed.length} completed</span><span>${remaining.length + errored.length} remaining</span></div>
    </div>
    <div class="char-breakdown">
      <div class="char-card typed"><div class="cl">Characters typed</div><div class="cv">${typedChars.toLocaleString()}</div></div>
      <div class="char-card remaining"><div class="cl">Characters remaining</div><div class="cv">${remainingChars.toLocaleString()}</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="remaining" onclick="switchTab('remaining')">Remaining <span class="badge badge-todo">${remaining.length + errored.length}</span></button>
      <button class="tab" data-tab="completed" onclick="switchTab('completed')">Completed <span class="badge badge-done">${completed.length}</span></button>
      <button class="tab" data-tab="all" onclick="switchTab('all')">All 100</button>
    </div>
    <div class="quote-list" id="quote-list"></div>`;

  resultsArea.innerHTML = html;
  window._allQuotes = merged;
  window._completed = completed;
  window._remaining = [...remaining, ...errored];
  switchTab('remaining');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  let list = tab === 'remaining' ? window._remaining : tab === 'completed' ? window._completed : window._allQuotes;
  const container = document.getElementById('quote-list');
  if (!list || list.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>${tab === 'completed' ? 'No quotes completed yet.' : tab === 'remaining' ? 'All 100 done — absolutely incredible.' : 'No data.'}</p></div>`;
    return;
  }
  container.innerHTML = list.map(q => `
    <a class="quote-item${q.error ? ' errored' : ''}" href="${q.link}" target="_blank" rel="noopener">
      <span class="quote-num">${q.number}</span>
      <span class="quote-name">${escHtml(q.name)}</span>
      ${q.error ? `<span class="quote-err-label">${escHtml(q.errorDetail || 'failed')}</span>` : ''}
      ${q.length ? `<span class="quote-chars">${q.length.toLocaleString()} chars</span>` : ''}
      <span class="quote-status ${q.completed ? 'done' : q.error ? 'err' : 'todo'}"></span>
    </a>`).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
